<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee management app</title>
    <style>
        body{
            background-color: #e8f0f7;
            text-align: center;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            display: flex;
        }
        .sidebar{
            background-color:rgb(11, 118, 160);
            padding: 15px;
            width:200px;
            color: white;
            position: fixed;
            min-height: 100vh;
        }
        .profile section{
            background-color: rgb(100, 176, 176);
            padding: 20px;
            display: flex;
            align-items: center;
    
        }
        .profile-img{
        width: 45px;
        height: 45px;
        border-radius: 50%;
        margin-right: 12px;
        border:2px solid black
        }
        .user-name{
            font-size: 0.9rem;
            font-weight: 600;
        }
        .status{
            font-size: 0.75rem;
            color: gray;
            display: flex;
            align-items: center;
            margin-top: 3px;
        }
        .dot{
            height:10px;
            width:10px;
            background-color: coral;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .nav-links {
            list-style: none;
            margin-top: 10px;
        }

        .nav-links li a {
            display: block;
            padding: 12px 20px;
            color: #b8c7ce;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-links li a:hover {
            background-color: #1e282c;
            color: #ffffff;
        }

        .nav-links li a.active {
            background-color: #1e282c;
            color: #ffffff;
            border-left-color: #3c8dbc;
        }


        .main-content {
            margin-left: 250px;
            padding: 20px;
            width: 100%;
            text-align: center;
        }

        .dashboard-header {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

    
        .stats-container {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 3px;
            color: white;
            position: relative;
            overflow: hidden;
            width: 150px;
        
        }

        .card h2 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .card p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .left-card { background-color: rgb(15, 150, 85);
        padding-left: 20px; }
        .right-card { background-color:coral; }

        .more-info {
            background: rgba(0,0,0,0.1);
            display: block;
            text-align: center;
            padding: 3px 0;
            margin: 15px -20px -20px -20px;
            text-decoration: none;
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="profile-section">
            <img src="../placeholder.png" class="profile-img">
            <div class="profile-info">
            <p class="user-name">Esther Jeptoo</p>
            <p class="status"><span class="dot"></span>Online</p></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active" onclick="setActive(this)">Home</a></li>
               <li><a href="new-contact.html"  onclick="setActive(this)">Add New Contact</a></li>
               <li><a href="view-contacts.html"  onclick="setActive(this)">View All Cotacts</a></li>
            </ul></nav>
            <main class="main-content">
                <h1 class="dashboard-header">Dashboard</h1>
                <div class="stats-container">
                    <div class="card left-card">
                        <h2>5</h2>
                        <p>No. of Positions</p>
                        <a href="3"class="more-info">More info</a>
                    </div>
                    <div class="card right-card">
                        <h2>50</h2>
                        <p>No.of Contacts</p>
                        <a href="#" class="more-info">More Info</a>
                    </div>
                </div>
                <p>Welcome to the new empolyee naviagtion page,here you will be able to see and update
                    your work details.Have a blast!
                </p>
            </main>
            <script>
                function setActive(element){
                    const links=document.querySelectorAll('.nav-links a');
                    links.forEach(link =>link.classList.remove('active'));
                    element.classList.add('active');
                }
            </script>
    
</body>
</html>
